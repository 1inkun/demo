<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --bg: #1a1a1c;
            --surface: #242428;
            --surface-hover: #2c2c30;
            --border: #353538;
            --text: #c8c8cc;
            --text-muted: #7a7a80;
            --accent: #5b6e7a;
            --accent-hover: #6e8391;
            --danger: #6e4e4e;
            --danger-hover: #8a5e5e;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
            min-height: 100vh;
        }

        #Application {
            width: 100%;
            max-width: 480px;
        }

        .header {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 28px;
        }

        .itemContainer {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .itemContainer p {
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .itemContainer input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.92rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .itemContainer input::placeholder {
            color: var(--text-muted);
        }

        .itemContainer input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 110, 122, 0.15);
        }

        .btn-add {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #e2e2e6;
            border: none;
            border-radius: var(--radius);
            padding: 10px 0;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 32px;
        }

        .btn-add:hover {
            background: var(--accent-hover);
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        .list-header {
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            transition: background 0.15s, border-color 0.15s;
        }

        .item:hover {
            background: var(--surface-hover);
        }

        .item span {
            font-size: 0.93rem;
            color: var(--text);
        }

        .btn-delete {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #e8d0d0;
        }

        .empty-state {
            text-align: center;
            padding: 36px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="Application">
        <div class="header">待办事项</div>
        <div class="itemContainer">
            <p>输入待办</p>
            <input v-model="whattodo" placeholder="写点什么..."></input>
        </div>
        <button class="btn-add" @click="addItem()">添加待办</button>
        <div>
            <div class="list-header">待办列表</div>
            <div v-if="todos.length !== 0" class="todo-list">
                <div v-for="(data,index) in todos" class="item">
                    <span>{{`${ index + 1}. ${data}`}}</span>
                    <button class="btn-delete" @click="removeItem(index)">删除</button>
                </div>
            </div>
            <div v-else class="empty-state">还没有待办事项</div>
        </div>
    </div>
    <script>
        const App = {
            data(){
                return {
                     todos : [],
                     whattodo : '',
                }
            },
            methods:{
                addItem () {
                    if (this.whattodo !== ''){
                        this.todos.push(this.whattodo);
                        this.whattodo = '';
                    } else {
                        alert("请输入内容!")
                    }
                },
                removeItem (rmItemIndex) {
                   this.todos.splice(rmItemIndex,1) 
                }
            }
        }
        Vue.createApp(App).mount("#Application")
    </script>
</body>
</html>
